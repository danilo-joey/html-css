<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="estilos/style.css">
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">

            </div>
            <div id="formulario">
                <h1>Login</h1>
                <p>Seja Bem-vindo.faça seu login!!!</p>
                <form action="login.php" method="post">
                    <p>
                        <label for="inome">Nome:</label>
                        <input type="email" name="nome" id="inome" required>
                    </p>
                    <p>
                        <label for="isenha">Senha:</label>
                        <input type="password" name="senha" id="isenha" required minlength="6" maxlength="8">
                    </p>
                    <p>
                        <input type="submit" value="Entrar">
                        <input type="reset" value="Limpar">
                    </p>
                </form>

            </div>
        </section>
    </main>
    
</body>
</html>
